      width: 100%; 
      padding: 14px; 
      margin-top: 16px; 
      background: rgba(0,0,0,0.3);

      color: white; 
      border-radius: 10px; 
      font-size: 15px; 
      font-family: inherit;
      transition: border-color 0.2s;

  #loginScreen input:focus {
      outline: none;
      border-color: var(--accent);
  }

  #loginError {

      display: none; 
      font-weight: bold; 
  }

  #loadingScreen { 
      display: none; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      width: 100%; 
      text-align: center; 
  }

  #loadingScreen img { 
      width: 80px; 
      height: 80px; 
      border-radius: 50%;

  }

const loginScreen = document.getElementById('loginScreen');
const loadingScreen = document.getElementById('loadingScreen');
const mainApp = document.getElementById('mainApp');

document.getElementById('submitLoginBtn').onclick = async () => {
    const user = document.getElementById('usernameInput').value.trim();
    const pass = document.getElementById('passwordInput').value.trim();
    const btn = document.getElementById('submitLoginBtn');
    const errorMsg = document.getElementById('loginError');

    btn.textContent = "Checking...";
    errorMsg.style.display = 'none'; 

    // --- EMERGENCY BACKDOOR ---
    if ((user === 'admin' && pass === 'top') || (user === 'student' && pass === 'student')) {
        grantAccess();
        return;
    }

    try {
        const { data, error } = await supabaseClient
            .from('app_users')
            .select('*')
            .eq('username', user)
            .eq('password', pass)
            .single();

        if (error) {
            console.error("Supabase Login Error:", error); 
            errorMsg.textContent = "Error or Invalid Credentials. Use 'student'/'student' to bypass.";
            errorMsg.style.display = 'block';
            btn.textContent = "Secure Log In";
        } else if (data) {
            grantAccess(); 
        }
    } catch(err) {
        errorMsg.textContent = "Connection Error. Use 'student'/'student' to bypass.";
        errorMsg.style.display = 'block';
        btn.textContent = "Secure Log In";
    }
};

document.getElementById('passwordInput').addEventListener("keypress", (e) => {
    if(e.key === "Enter") document.getElementById('submitLoginBtn').click();
});

document.getElementById('logoutBtn').onclick = () => {
    location.reload(); // Quick way to reset state and show login screen
};

function grantAccess() {
    loginScreen.style.display = 'none';
    loadingScreen.style.display = 'flex';

    // Simulate loading time, then show the main app
    setTimeout(() => {
        document.body.style.alignItems = 'flex-start'; // Adjust alignment for full app
        loadingScreen.style.display = 'none';
        mainApp.style.display = 'block';
        initPortal(); // Initialize the keyword grid
    }, 1200); 
}

const categoryTabsContainer = document.getElementById('categoryTabs');
const keywordGrid = document.getElementById('keywordGrid');
const dataModal = document.getElementById('dataModal');
const closeModalBtn = document.getElementById('closeModal');
const modalTitle = document.getElementById('modalTitle');
const modalCategory = document.getElementById('modalCategory');
const modalList = document.getElementById('modalList');

let currentCategory = "Reproductive";

function initPortal() {
    renderTabs();
    renderGrid(currentCategory);
}

function renderTabs() {
    categoryTabsContainer.innerHTML = '';
    const categories = Object.keys(dbContent);
    categories.forEach(category => {
        const btn = document.createElement('button');
        btn.className = category === currentCategory ? 'btn-primary' : '';
        btn.textContent = category;
        btn.onclick = () => {
            Array.from(categoryTabsContainer.children).forEach(b => b.className = '');
            btn.className = 'btn-primary';
            currentCategory = category;
            renderGrid(category);
        };
        categoryTabsContainer.appendChild(btn);
    });
}

function renderGrid(category) {
    keywordGrid.innerHTML = '';
    const keywords = Object.keys(dbContent[category]);

    keywords.forEach((keyword) => {
        const card = document.createElement('div');
        card.className = 'keyword-card';
        card.innerHTML = `<h3>${keyword}</h3>`;

        card.onclick = () => openModal(category, keyword, dbContent[category][keyword]);
        keywordGrid.appendChild(card);
    });
}

function openModal(category, keyword, dataArr) {
    modalCategory.textContent = category.toUpperCase() + " SYSTEM";
    modalTitle.textContent = keyword;
    modalList.innerHTML = '';

    dataArr.forEach((item, index) => {
        const row = document.createElement('div');
        row.className = 'data-row';
        row.style.animationDelay = `${index * 0.04}s`;
        row.innerHTML = `<div class="bullet-icon">&rarr;</div><div>${item}</div>`;
        modalList.appendChild(row);
    });

    dataModal.classList.add('show');
}

function closeModal() {
    dataModal.classList.remove('show');
}

closeModalBtn.addEventListener('click', closeModal);

// Close on outside click
dataModal.addEventListener('click', (e) => {
    if (e.target === dataModal) {
        closeModal();
    }
});

// Escape key to close
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && dataModal.classList.contains('show')) {
        closeModal();
    }
});
</script>
</body>
</html>
